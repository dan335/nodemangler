# Builds Windows, Linux, and macOS executables and publishes them to GitHub
# Releases whenever a vX.Y.Z tag is pushed (normally by scripts/release.sh or
# scripts\release.bat). Also pushes the same builds to itch.io if the
# ITCH_TARGET repository variable ("user/game") and BUTLER_API_KEY secret
# are configured; see scripts/README.md.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libssl-dev pkg-config
      - name: Check tag matches Cargo.toml version
        working-directory: app
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "v$VERSION" != "${{ github.ref_name }}" ]; then
            echo "tag ${{ github.ref_name }} does not match workspace version $VERSION" >&2
            exit 1
          fi
      - name: Run tests
        working-directory: app
        run: cargo test --workspace

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libssl-dev pkg-config
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        working-directory: app
        run: cargo build --release --target ${{ matrix.target }} -p mangler_gui -p mangler_cli
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          STAGE="nodemangler-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir "$STAGE"
          cp "app/target/${{ matrix.target }}/release/mangler_gui" \
             "app/target/${{ matrix.target }}/release/mangler_cli" \
             README.md LICENSE.md "$STAGE/"
          tar czf "$STAGE.tar.gz" "$STAGE"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "nodemangler-${{ github.ref_name }}-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "app/target/${{ matrix.target }}/release/mangler_gui.exe", `
                    "app/target/${{ matrix.target }}/release/mangler_cli.exe", `
                    README.md, LICENSE.md $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: nodemangler-${{ matrix.name }}
          path: |
            nodemangler-*.tar.gz
            nodemangler-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            nodemangler-*.tar.gz nodemangler-*.zip \
            --repo "${{ github.repository }}" \
            --title "NodeMangler ${{ github.ref_name }}" \
            --generate-notes

  itch:
    needs: build
    runs-on: ubuntu-latest
    # Skipped until the ITCH_TARGET repository variable is set, so releases
    # work before the itch.io page exists.
    if: vars.ITCH_TARGET != ''
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Install butler
        run: |
          curl -fL -o butler.zip "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip butler.zip butler
          chmod +x butler
          ./butler -V
      - name: Push builds to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE_PREFIX="nodemangler-${GITHUB_REF_NAME}"
          for archive in "$STAGE_PREFIX"-*.tar.gz; do
            tar xzf "$archive"
          done
          unzip -q "$STAGE_PREFIX-windows-x86_64.zip"
          push() {
            ./butler push "$STAGE_PREFIX-$1" "${{ vars.ITCH_TARGET }}:$2" \
              --userversion "$VERSION"
          }
          push windows-x86_64 windows
          push linux-x86_64  linux
          push macos-aarch64 mac-arm64
          push macos-x86_64  mac-x86_64
