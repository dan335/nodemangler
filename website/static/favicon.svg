<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="none" aria-hidden="true">
  <!-- Favicon version of the wordmark's node-graph mark (site-design.html).
       Favicons render outside the page's CSS custom properties, so the
       theme colors are hardcoded here and re-picked per color scheme with
       a media query, approximating the oklch design tokens as hex:
         light: ink (--fg), ember (--accent), border-strong
         dark:  paper (--fg), amber (--accent), border-strong -->
  <style>
    .node-a, .node-b { stroke: #2b2926; }
    .node-c { stroke: #b35730; }
    .connector { stroke: #c7c3bc; }
    @media (prefers-color-scheme: dark) {
      .node-a, .node-b { stroke: #f0ede8; }
      .node-c { stroke: #dda352; }
      .connector { stroke: #474c54; }
    }
  </style>
  <rect class="node-a" x="1" y="8" width="6" height="6" rx="1" stroke-width="1.5"></rect>
  <rect class="node-b" x="15" y="1" width="6" height="6" rx="1" stroke-width="1.5"></rect>
  <rect class="node-c" x="15" y="15" width="6" height="6" rx="1" stroke-width="1.5"></rect>
  <path class="connector" d="M7 11 H11 M11 11 V4 H15 M11 11 V18 H15" stroke-width="1.5"></path>
</svg>
